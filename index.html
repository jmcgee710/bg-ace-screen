<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#c8102e">
<title>Screen Pricing — Ace Hardware, Barnegat</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Screen Pricing">
<style>
  :root{
    --red:#c8102e;
    --red-dark:#a10d25;
    --ink:#1a1a1a;
    --muted:#6b7280;
    --line:#e5e7eb;
    --bg:#f5f6f8;
    --card:#ffffff;
    --ok:#0f7a3d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.4;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 40px}
  header{
    display:flex;align-items:center;gap:12px;
    padding:16px 4px 20px;
  }
  .logo{
    width:44px;height:44px;flex:0 0 44px;border-radius:10px;
    background:var(--red);color:#fff;font-weight:800;font-size:20px;
    display:flex;align-items:center;justify-content:center;letter-spacing:-1px;
  }
  header h1{font-size:18px;margin:0;line-height:1.2}
  header p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .gear{
    margin-left:auto;width:44px;height:44px;flex:0 0 44px;border-radius:10px;
    border:1.5px solid var(--line);background:#fff;font-size:20px;color:var(--muted);cursor:pointer;
  }
  .gear:active{background:var(--bg)}
  .gear[aria-expanded=true]{border-color:var(--red);color:var(--red)}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px;margin-bottom:16px;
  }
  label.field{display:block;margin-bottom:16px}
  label.field:last-child{margin-bottom:0}
  .field span{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
  .field small{font-weight:400;color:var(--muted)}
  input[type=number]{
    width:100%;font-size:20px;padding:14px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);
  }
  input[type=number]:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.12)}
  .opt-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:6px}
  .opt{
    display:flex;flex-direction:column;align-items:flex-start;gap:2px;
    padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;
    background:#fff;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;
    text-align:left;transition:border-color .12s,background .12s;
  }
  .opt small{font-weight:400;color:var(--muted);font-size:13px}
  .opt[aria-pressed=true]{border-color:var(--red);background:rgba(200,16,46,.05)}
  .qty-row{display:flex;align-items:center;gap:14px;margin-top:6px}
  .step{
    width:56px;height:56px;flex:0 0 56px;border-radius:12px;border:1.5px solid var(--line);
    background:#fff;font-size:28px;font-weight:700;color:var(--red);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .step:active{background:var(--bg)}
  .qty-val{flex:1;text-align:center;font-size:28px;font-weight:800}
  .add-btn{
    width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:16px;border:none;border-radius:12px;margin-bottom:16px;
    background:var(--red);color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  }
  .add-btn:active{background:var(--red-dark)}
  .add-btn:disabled{background:#d1d5db;cursor:default}
  .line{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .line:first-child{padding-top:2px}
  .line:last-child{border-bottom:none;padding-bottom:2px}
  .line .desc{flex:1;font-size:15px;font-weight:600}
  .line .desc small{display:block;font-weight:400;color:var(--muted);font-size:13px}
  .line .amt{font-size:15px}
  .line .rm{
    width:40px;height:40px;flex:0 0 40px;border:none;border-radius:10px;
    background:transparent;color:var(--muted);font-size:22px;cursor:pointer;
  }
  .line .rm:active{color:var(--red)}
  .clear-btn{
    display:block;margin:4px auto 0;padding:10px 16px;background:none;border:none;
    color:var(--muted);font-size:14px;text-decoration:underline;cursor:pointer;
  }
  [hidden]{display:none !important}
  .total-card{background:var(--ink);color:#fff;border:none}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:15px}
  .row.muted{color:#c9cbd1}
  .row.grand{font-size:15px;padding-top:12px;margin-top:6px;border-top:1px solid rgba(255,255,255,.18)}
  .row.grand .amt{font-size:32px;font-weight:800}
  .amt{font-variant-numeric:tabular-nums;font-weight:700}
  .foot{text-align:center;font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Ace</div>
    <div>
      <h1>Screen Pricing</h1>
      <p>Ace Hardware · Barnegat, NJ</p>
    </div>
    <button class="gear" id="gearBtn" onclick="toggleSettings()" aria-expanded="false" aria-label="Pricing settings">⚙</button>
  </header>

  <div class="card" id="settingsCard" hidden>
    <label class="field">
      <span>Rate <small>($ per inch of length + width)</small></span>
      <input id="rateIn" type="number" inputmode="decimal" min="0" step="0.01" oninput="settingsChanged()">
    </label>
    <label class="field">
      <span>Tax <small>(%)</small></span>
      <input id="taxIn" type="number" inputmode="decimal" min="0" step="0.001" oninput="settingsChanged()">
    </label>
    <button class="clear-btn" onclick="resetSettings()">Reset to defaults</button>
  </div>

  <div class="card">
    <label class="field">
      <span>Length <small>(inches)</small></span>
      <input id="len" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" oninput="calc()">
    </label>
    <label class="field">
      <span>Width <small>(inches)</small></span>
      <input id="wid" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" oninput="calc()">
    </label>
  </div>

  <div class="card">
    <span class="field" style="font-size:14px;font-weight:600;margin-bottom:2px">Material</span>
    <div class="opt-grid">
      <button class="opt" data-mat="aluminum" aria-pressed="true" onclick="pickMat('aluminum')">
        Aluminum <small>Standard mesh</small>
      </button>
      <button class="opt" data-mat="fiberglass" aria-pressed="false" onclick="pickMat('fiberglass')">
        Fiberglass <small>Same price as aluminum</small>
      </button>
    </div>
  </div>

  <div class="card">
    <span class="field" style="font-size:14px;font-weight:600;margin-bottom:2px">Quantity</span>
    <div class="qty-row">
      <button class="step" onclick="bump(-1)" aria-label="Decrease">−</button>
      <div class="qty-val" id="qtyVal">1</div>
      <button class="step" onclick="bump(1)" aria-label="Increase">+</button>
    </div>
  </div>

  <button class="add-btn" id="addBtn" onclick="addLine()" disabled>
    <span>+ Add screen to quote</span><span class="amt" id="entryAmt">$0.00</span>
  </button>

  <div class="card" id="quoteCard" hidden>
    <span class="field" style="font-size:14px;font-weight:600;margin-bottom:2px">Quote</span>
    <div id="quoteList"></div>
  </div>

  <div class="card total-card">
    <div class="row muted"><span>Per screen <small id="perScreenNote">(this screen)</small></span><span class="amt" id="perScreen">$0.00</span></div>
    <div class="row muted"><span>Subtotal <span id="qtyEcho">(0 screens)</span></span><span class="amt" id="subtotal">$0.00</span></div>
    <div class="row muted"><span>Tax <span id="taxPct"></span></span><span class="amt" id="tax">$0.00</span></div>
    <div class="row grand"><span>Total</span><span class="amt" id="total">$0.00</span></div>
  </div>

  <button class="clear-btn" id="clearBtn" onclick="clearQuote()" hidden>Clear quote</button>

  <p class="foot">Prices are per screen. Dimensions in inches.</p>
</div>

<script>
// ——— Store defaults. Live values are editable in the ⚙ panel and stored on-device ———
const DEFAULT_RATE = 0.37;      // $ per inch (length + width)
const DEFAULT_TAX  = 0.06625;   // NJ sales tax 6.625%
const SETTINGS_KEY = 'screen-pricing-settings';
// ————————————————————————————————————————————————————————————————————————————————

let rate = DEFAULT_RATE;
let tax  = DEFAULT_TAX;

function loadSettings(){
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s && s.rate > 0)  rate = s.rate;
    if (s && s.tax >= 0)  tax  = s.tax;
  } catch (e) {}
}

function saveSettings(){
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({rate, tax})); } catch (e) {}
}

function settingsChanged(){
  const r = parseFloat(document.getElementById('rateIn').value);
  const t = parseFloat(document.getElementById('taxIn').value);
  rate = r > 0  ? r : DEFAULT_RATE;
  tax  = t >= 0 ? t / 100 : DEFAULT_TAX;
  saveSettings();
  renderTaxPct();
  calc();
}

function resetSettings(){
  try { localStorage.removeItem(SETTINGS_KEY); } catch (e) {}
  rate = DEFAULT_RATE;
  tax  = DEFAULT_TAX;
  fillSettingsInputs();
  renderTaxPct();
  calc();
}

function fillSettingsInputs(){
  document.getElementById('rateIn').value = rate;
  document.getElementById('taxIn').value  = +(tax * 100).toFixed(4);
}

function toggleSettings(){
  const card = document.getElementById('settingsCard');
  card.hidden = !card.hidden;
  document.getElementById('gearBtn').setAttribute('aria-expanded', String(!card.hidden));
}

function renderTaxPct(){
  document.getElementById('taxPct').textContent = '(' + (tax * 100).toFixed(3).replace(/\.?0+$/,'') + '%)';
}

let mat = 'aluminum';
let qty = 1;
let lines = [];   // committed screens: {len, wid, mat, qty}

function pickMat(m){
  mat = m;
  document.querySelectorAll('.opt').forEach(b=>{
    b.setAttribute('aria-pressed', b.dataset.mat === m ? 'true' : 'false');
  });
  calc();
}

function bump(d){
  qty = Math.max(1, qty + d);
  document.getElementById('qtyVal').textContent = qty;
  calc();
}

const money = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

const matLabel = m => m === 'fiberglass' ? 'Fiberglass' : 'Aluminum';
const priceFor = l => (l.len + l.wid) * rate * l.qty;

function currentEntry(){
  const len = Math.max(0, parseFloat(document.getElementById('len').value) || 0);
  const wid = Math.max(0, parseFloat(document.getElementById('wid').value) || 0);
  return {len, wid, mat, qty};
}

function resetEntry(){
  document.getElementById('len').value = '';
  document.getElementById('wid').value = '';
  qty = 1;
  document.getElementById('qtyVal').textContent = qty;
}

function addLine(){
  const e = currentEntry();
  if (e.len <= 0 || e.wid <= 0) return;
  lines.push(e);
  resetEntry();
  calc();
}

function removeLine(i){
  lines.splice(i, 1);
  calc();
}

function clearQuote(){
  lines = [];
  resetEntry();
  calc();
}

function renderQuote(){
  const card = document.getElementById('quoteCard');
  card.hidden = lines.length === 0;
  document.getElementById('quoteList').innerHTML = lines.map((l, i) =>
    '<div class="line">' +
      '<div class="desc">' + l.len + ' × ' + l.wid + (l.qty > 1 ? ' · ×' + l.qty : '') +
        '<small>' + matLabel(l.mat) + ' · ' + money((l.len + l.wid) * rate) + ' each</small></div>' +
      '<span class="amt">' + money(priceFor(l)) + '</span>' +
      '<button class="rm" onclick="removeLine(' + i + ')" aria-label="Remove screen">✕</button>' +
    '</div>'
  ).join('');
}

function calc(){
  const e = currentEntry();
  const entryActive = e.len + e.wid > 0;
  const perScreen   = entryActive ? (e.len + e.wid) * rate : 0;

  let subtotal = entryActive ? priceFor(e) : 0;
  let screens  = entryActive ? e.qty : 0;
  lines.forEach(l => { subtotal += priceFor(l); screens += l.qty; });

  const taxAmt = subtotal * tax;
  const total  = subtotal + taxAmt;

  document.getElementById('addBtn').disabled = !(e.len > 0 && e.wid > 0);
  document.getElementById('entryAmt').textContent = money(entryActive ? priceFor(e) : 0);
  document.getElementById('perScreenNote').hidden = lines.length === 0;
  document.getElementById('clearBtn').hidden = lines.length === 0;
  renderQuote();

  document.getElementById('perScreen').textContent = money(perScreen);
  document.getElementById('qtyEcho').textContent   = '(' + screens + (screens === 1 ? ' screen)' : ' screens)');
  document.getElementById('subtotal').textContent  = money(subtotal);
  document.getElementById('tax').textContent        = money(taxAmt);
  document.getElementById('total').textContent      = money(total);
}

// Init
loadSettings();
fillSettingsInputs();
renderTaxPct();
calc();

// Register the service worker for offline / installable use.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
